<!DOCTYPE html>
<html>
<head>
    <title>Merchant Store</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            background: #2c3e50;
            color: white;
            padding: 15px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px gray;
        }
        button {
            background: #27ae60;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🛒 My Merchant Store</h1>

<div class="container">

    <div class="product">
        <h3>Product 1</h3>
        <p>Price: ₹500</p>
        <button onclick="buy()">Buy Now</button>
    </div>

    <div class="product">
        <h3>Product 2</h3>
        <p>Price: ₹800</p>
        <button onclick="buy()">Buy Now</button>
    </div>

    <div class="product">
        <h3>Product 3</h3>
        <p>Price: ₹1200</p>
        <button onclick="buy()">Buy Now</button>
    </div>

</div>

<script>
function buy() {
    alert("Order placed successfully!");
}
</script>

</body>
</html>
